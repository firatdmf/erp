{% load accounting_tags %}

<div class="exchange-rates-grid">
  {% for item in rates %}
  <div class="rate-item">
    <span class="rate-currency">{{ item.from_currency.code }}</span>
    <span class="rate-value">1 {{ item.from_currency.code }} = {{ item.rate|format_money }} {{ base_currency.code }}</span>
  </div>
  {% empty %}
  <div style="color: #94a3b8; font-size: 0.9rem;">No exchange rates available.</div>
  {% endfor %}
</div>
