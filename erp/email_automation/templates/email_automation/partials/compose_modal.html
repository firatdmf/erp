{% load i18n %}
<style>
  .nmc-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,20,25,0.22);
    backdrop-filter: blur(2px);
    z-index: 9998;
    animation: nmc-fade .18s ease-out;
  }
  @keyframes nmc-fade { from { opacity: 0; } }

  .nmc-modal {
    position: fixed; bottom: 28px; right: 28px;
    width: 720px; max-width: calc(100vw - 56px);
    max-height: 88vh;
    background: #FFF;
    border: 1px solid #E2E8EE;
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(15,20,25,0.22);
    z-index: 9999;
    display: flex; flex-direction: column;
    font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
    animation: nmc-slide .26s cubic-bezier(.22,1,.36,1);
    overflow: hidden;
  }
  @keyframes nmc-slide { from { transform: translateY(24px); opacity: 0; } }

  /* ── Header ── */
  .nmc-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px;
    background: linear-gradient(135deg, #147F74, #0F766E);
    color: #FFF;
    cursor: move; user-select: none;
    flex-shrink: 0;
  }
  .nmc-head-title {
    font: 700 14px var(--font-sans);
    display: flex; align-items: center; gap: 10px;
    letter-spacing: -.005em;
  }
  .nmc-head-title i { font-size: 14px; opacity: .9; }
  .nmc-head-actions { display: flex; gap: 6px; }
  .nmc-head-btn {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.14); border: none; border-radius: 8px;
    color: #FFF; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: background .12s;
  }
  .nmc-head-btn:hover { background: rgba(255,255,255,0.26); }

  /* ── Form ── */
  .nmc-form {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    background: #FFF;
  }
  .nmc-fields {
    padding: 20px 22px 4px;
    flex: 1; min-height: 0;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* ── Field group ── */
  .nmc-field { display: flex; flex-direction: column; gap: 6px; }
  .nmc-flbl {
    font: 600 11px var(--font-sans); color: #64748B;
    text-transform: uppercase; letter-spacing: .08em;
    display: flex; align-items: center; gap: 8px;
  }
  .nmc-flbl-r { margin-left: auto; display: flex; gap: 4px; }
  .nmc-toggle {
    color: #0F766E; font: 600 11px var(--font-sans);
    cursor: pointer; padding: 3px 9px;
    border-radius: 6px;
    border: 1px solid #CCFBF1; background: #F0FDFA;
    transition: all .12s;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .nmc-toggle:hover { background: #CCFBF1; }

  /* ── Recipient (chip) input ── */
  .nmc-chips-box {
    border: 1.5px solid #E2E8EE;
    border-radius: 10px;
    padding: 7px 10px;
    background: #FFF;
    min-height: 42px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    transition: all .15s;
    position: relative;
  }
  .nmc-chips-box:focus-within {
    border-color: #147F74;
    box-shadow: 0 0 0 3px rgba(20,127,116,0.10);
  }
  .nmc-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px 4px 11px;
    background: #E5F1F0;
    border: 1px solid #CCFBF1;
    border-radius: 14px;
    font: 500 12.5px var(--font-sans);
    color: #005354;
    max-width: 100%;
  }
  .nmc-chip > span { overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .nmc-chip-x {
    cursor: pointer; opacity: .6;
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 9px;
    transition: all .12s;
  }
  .nmc-chip-x:hover { opacity: 1; background: #99F6E4; }
  .nmc-chip-input {
    flex: 1 1 160px; min-width: 120px;
    border: none; outline: none;
    background: transparent;
    font: 500 13.5px var(--font-sans);
    color: #0F1419;
    padding: 4px 0;
  }
  .nmc-chip-input::placeholder { color: #94A3B8; }

  /* ── Autocomplete dropdown ── */
  .nmc-ac {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px);
    background: #FFF;
    border: 1px solid #E2E8EE;
    border-radius: 12px;
    box-shadow: 0 14px 32px rgba(15,20,25,0.14);
    max-height: 280px; overflow-y: auto;
    z-index: 100;
    display: none;
    padding: 4px;
  }
  .nmc-ac.show { display: block; }
  .nmc-ac-item {
    padding: 9px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    font: 500 13px var(--font-sans);
    color: #0F1419;
    border-radius: 8px;
  }
  .nmc-ac-item:hover, .nmc-ac-item.hl { background: #F0FDFA; color: #005354; }
  .nmc-ac-item i {
    width: 26px; height: 26px;
    background: #F0FDFA; color: #0F766E;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .nmc-ac-name { font-weight: 600; }
  .nmc-ac-email { color: #94A3B8; font-size: 11.5px; margin-left: 4px; }

  /* ── Subject / Body ── */
  .nmc-input {
    width: 100%; box-sizing: border-box;
    padding: 11px 14px;
    border: 1.5px solid #E2E8EE;
    border-radius: 10px;
    background: #FFF;
    font: 500 13.5px var(--font-sans);
    color: #0F1419;
    outline: none;
    transition: all .15s;
  }
  .nmc-input::placeholder { color: #94A3B8; }
  .nmc-input:focus {
    border-color: #147F74;
    box-shadow: 0 0 0 3px rgba(20,127,116,0.10);
  }
  textarea.nmc-input {
    resize: vertical;
    min-height: 180px;
    line-height: 1.6;
    font-weight: 400;
    font-size: 13.5px;
  }

  /* ── Attachments preview ── */
  .nmc-attachments {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 22px;
  }
  .nmc-attachments:empty { padding: 0; }
  .nmc-att {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    background: #F8FAFC;
    border: 1px solid #E2E8EE;
    border-radius: 9px;
    font: 500 12.5px var(--font-sans);
    color: #475569;
  }
  .nmc-att > i { color: #147F74; font-size: 13px; }
  .nmc-att-rm {
    cursor: pointer; color: #94A3B8; font-size: 11px; margin-left: 2px;
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .nmc-att-rm:hover { color: #FFF; background: #DC2626; }

  /* ── Toast ── */
  .nmc-toast {
    margin: 4px 22px;
    padding: 11px 14px;
    border-radius: 9px;
    font: 600 12.5px var(--font-sans);
    display: flex; align-items: center; gap: 9px;
    animation: nmc-slide .22s;
  }

  /* ── Footer ── */
  .nmc-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    border-top: 1px solid #E2E8EE;
    background: #FAFCFB;
    flex-shrink: 0;
  }
  .nmc-tools { display: flex; gap: 4px; }
  .nmc-tool {
    width: 36px; height: 36px; border-radius: 9px;
    background: transparent; border: 1px solid transparent;
    cursor: pointer;
    color: #475569;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .nmc-tool:hover { background: #E5F1F0; color: #005354; border-color: #CCFBF1; }

  .nmc-send {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 22px;
    background: #147F74; color: #FFF;
    border: none; border-radius: 10px;
    font: 600 13.5px var(--font-sans);
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 2px 4px rgba(20,127,116,0.18);
  }
  .nmc-send:hover { background: #0F766E; box-shadow: 0 4px 14px rgba(20,127,116,0.28); transform: translateY(-1px); }
  .nmc-send:disabled { background: #94A3B8; cursor: not-allowed; transform: none; box-shadow: none; }
  .nmc-send i { font-size: 12px; }

  @media (max-width: 760px) {
    .nmc-modal { right: 12px; left: 12px; bottom: 12px; width: auto; }
  }
</style>

<div class="nmc-backdrop" onclick="closeComposeModal()"></div>
<div class="nmc-modal" id="nmc-modal">
  <!-- Header -->
  <div class="nmc-head" id="nmc-head">
    <div class="nmc-head-title">
      <i class="fas fa-pen-to-square"></i> {% trans "New message" %}
    </div>
    <div class="nmc-head-actions">
      <button type="button" class="nmc-head-btn" onclick="closeComposeModal()" title="{% trans 'Close' %}">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- Form -->
  <form class="nmc-form" id="nmc-form" onsubmit="event.preventDefault(); nmcSend();">
    {% csrf_token %}
    <input type="hidden" name="company_id" id="nmc-company-id" value="{{ company_id|default:'' }}">
    <input type="hidden" name="contact_id" id="nmc-contact-id" value="{{ contact_id|default:'' }}">

    <div class="nmc-fields">

      <!-- TO -->
      <div class="nmc-field">
        <div class="nmc-flbl">
          <span>{% trans "To" %}</span>
          <div class="nmc-flbl-r">
            <span class="nmc-toggle" id="nmc-cc-link"
                  onclick="document.getElementById('nmc-cc-field').style.display='flex'; this.style.display='none';">Cc</span>
            <span class="nmc-toggle" id="nmc-bcc-link"
                  onclick="document.getElementById('nmc-bcc-field').style.display='flex'; this.style.display='none';">Bcc</span>
          </div>
        </div>
        <div class="nmc-chips-box" data-kind="to">
          {% if recipient_email %}
          <span class="nmc-chip" data-email="{{ recipient_email }}">
            <span>{{ recipient_name|default:recipient_email }}</span>
            <span class="nmc-chip-x" onclick="nmcRemoveChip(this)"><i class="fas fa-times"></i></span>
          </span>
          {% endif %}
          <input type="text" class="nmc-chip-input"
                 placeholder="{% if not recipient_email %}{% trans 'Type email, name or company…' %}{% endif %}"
                 autocomplete="off">
          <div class="nmc-ac"></div>
        </div>
      </div>

      <!-- CC -->
      <div class="nmc-field" id="nmc-cc-field" style="display:none;">
        <div class="nmc-flbl"><span>Cc</span></div>
        <div class="nmc-chips-box" data-kind="cc">
          <input type="text" class="nmc-chip-input" placeholder="{% trans 'Carbon copy recipients' %}" autocomplete="off">
          <div class="nmc-ac"></div>
        </div>
      </div>

      <!-- BCC -->
      <div class="nmc-field" id="nmc-bcc-field" style="display:none;">
        <div class="nmc-flbl"><span>Bcc</span></div>
        <div class="nmc-chips-box" data-kind="bcc">
          <input type="text" class="nmc-chip-input" placeholder="{% trans 'Blind copy recipients' %}" autocomplete="off">
          <div class="nmc-ac"></div>
        </div>
      </div>

      <!-- SUBJECT -->
      <div class="nmc-field">
        <div class="nmc-flbl"><span>{% trans "Subject" %}</span></div>
        <input type="text" id="nmc-subject" class="nmc-input"
               placeholder="{% trans 'Write a clear subject line' %}" value="{{ subject|default:'' }}">
      </div>

      <!-- BODY -->
      <div class="nmc-field" style="flex:1;">
        <div class="nmc-flbl"><span>{% trans "Message" %}</span></div>
        <textarea id="nmc-body" class="nmc-input"
                  placeholder="{% trans 'Write your message here…' %}" rows="10"></textarea>
      </div>

      <!-- Attachments preview row (above footer, within the scroll area) -->
      <div id="nmc-attachments-row" class="nmc-field" style="display:none;">
        <div class="nmc-flbl"><span>{% trans "Attachments" %}</span></div>
        <div class="nmc-attachments" id="nmc-attachments"></div>
      </div>

      <!-- Toast -->
      <div id="nmc-toast" class="nmc-toast" style="display:none;"></div>
    </div>

    <!-- Footer -->
    <div class="nmc-foot">
      <div class="nmc-tools">
        <input type="file" id="nmc-file-input" multiple style="display:none;" onchange="nmcOnFiles(event)">
        <button type="button" class="nmc-tool" title="{% trans 'Attach files' %}"
                onclick="document.getElementById('nmc-file-input').click()">
          <i class="fas fa-paperclip"></i>
        </button>
        <button type="button" class="nmc-tool" title="{% trans 'Discard' %}"
                onclick="if(confirm('{% trans 'Discard this draft?' %}')) closeComposeModal();">
          <i class="fas fa-trash"></i>
        </button>
      </div>
      <button type="submit" class="nmc-send" id="nmc-send-btn">
        <i class="fas fa-paper-plane"></i> <span id="nmc-send-label">{% trans "Send" %}</span>
      </button>
    </div>
  </form>
</div>

<script>
(function(){
  const RECIPIENTS_URL = '{% url "email_automation:api_recipients" %}';
  const SEND_URL       = '{% url "email_automation:send_email" %}';
  const csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
  let attachedFiles = [];

  window.closeComposeModal = function () {
    const host = document.getElementById('nm-compose-host') || document.getElementById('mb-compose-host');
    if (host) host.innerHTML = '';
  };

  window.nmcRemoveChip = function (x) {
    const chip = x.closest('.nmc-chip');
    if (chip) chip.remove();
  };

  function chipsFor(kind) {
    const box = document.querySelector(`.nmc-chips-box[data-kind="${kind}"]`);
    if (!box) return [];
    return Array.from(box.querySelectorAll('.nmc-chip')).map(c => c.dataset.email).filter(Boolean);
  }

  function addChip(box, email, label) {
    const e = (email || '').trim();
    if (!e) return;
    if (Array.from(box.querySelectorAll('.nmc-chip')).some(c => c.dataset.email === e)) return;
    const chip = document.createElement('span');
    chip.className = 'nmc-chip';
    chip.dataset.email = e;
    chip.innerHTML = `<span>${(label || e).replace(/</g,'&lt;')}</span>
                      <span class="nmc-chip-x" onclick="nmcRemoveChip(this)"><i class="fas fa-times"></i></span>`;
    const input = box.querySelector('.nmc-chip-input');
    box.insertBefore(chip, input);
    input.value = '';
    input.placeholder = '';
    const ac = box.querySelector('.nmc-ac');
    if (ac) { ac.classList.remove('show'); ac.innerHTML = ''; }
  }

  document.querySelectorAll('.nmc-chips-box').forEach(box => {
    const input = box.querySelector('.nmc-chip-input');
    const ac    = box.querySelector('.nmc-ac');
    if (!input || !ac) return;

    // Clicking the chip area should focus the input
    box.addEventListener('click', (e) => {
      if (e.target === box) input.focus();
    });

    let debounce;
    input.addEventListener('input', () => {
      const q = input.value.trim();
      if (q.length < 2) { ac.classList.remove('show'); ac.innerHTML = ''; return; }
      clearTimeout(debounce);
      debounce = setTimeout(async () => {
        try {
          const r = await fetch(`${RECIPIENTS_URL}?q=${encodeURIComponent(q)}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
          });
          const data = await r.json();
          ac.innerHTML = '';
          (data.results || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'nmc-ac-item';
            const icon = item.kind === 'company' ? 'fa-building' : 'fa-user';
            div.innerHTML =
              `<i class="fas ${icon}"></i>
               <div style="min-width:0;flex:1;">
                 <div class="nmc-ac-name">${(item.name || '').replace(/</g,'&lt;')}</div>
                 <div class="nmc-ac-email">${(item.email || '').replace(/</g,'&lt;')}</div>
               </div>`;
            div.addEventListener('click', () => addChip(box, item.email, item.name));
            ac.appendChild(div);
          });
          if (data.results && data.results.length) ac.classList.add('show');
          else ac.classList.remove('show');
        } catch (e) { /* silent */ }
      }, 200);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',' || e.key === 'Tab') {
        const v = input.value.trim().replace(/,$/, '');
        if (v) {
          e.preventDefault();
          addChip(box, v, v);
        }
      }
      if (e.key === 'Backspace' && !input.value) {
        const last = box.querySelector('.nmc-chip:last-of-type');
        if (last) last.remove();
      }
      if (e.key === 'Escape') ac.classList.remove('show');
    });

    input.addEventListener('blur', () => {
      setTimeout(() => ac.classList.remove('show'), 150);
      const v = input.value.trim();
      if (v) addChip(box, v, v);
    });
  });

  window.nmcOnFiles = function (ev) {
    const files = Array.from(ev.target.files || []);
    files.forEach(f => attachedFiles.push(f));
    renderAttachments();
    ev.target.value = '';
  };
  function renderAttachments() {
    const host = document.getElementById('nmc-attachments');
    const row = document.getElementById('nmc-attachments-row');
    host.innerHTML = '';
    if (!attachedFiles.length) { row.style.display = 'none'; return; }
    row.style.display = 'flex';
    attachedFiles.forEach((f, idx) => {
      const div = document.createElement('span');
      div.className = 'nmc-att';
      const kb = (f.size / 1024).toFixed(0);
      div.innerHTML =
        `<i class="fas fa-paperclip"></i>
         <span>${f.name.replace(/</g,'&lt;')}</span>
         <span style="color:#94A3B8;font-size:11px;">${kb} KB</span>
         <span class="nmc-chip-x nmc-att-rm" data-idx="${idx}"><i class="fas fa-times"></i></span>`;
      div.querySelector('.nmc-att-rm').addEventListener('click', () => {
        attachedFiles.splice(idx, 1); renderAttachments();
      });
      host.appendChild(div);
    });
  }

  // Draggable header
  (function makeDraggable () {
    const modal = document.getElementById('nmc-modal');
    const head  = document.getElementById('nmc-head');
    if (!modal || !head) return;
    let sx=0, sy=0, ox=0, oy=0, dragging=false;
    head.addEventListener('mousedown', (e) => {
      if (e.target.closest('button')) return;
      dragging = true;
      sx = e.clientX; sy = e.clientY;
      const r = modal.getBoundingClientRect();
      ox = r.left; oy = r.top;
      modal.style.right = ''; modal.style.bottom = '';
      modal.style.left = ox + 'px'; modal.style.top = oy + 'px';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      modal.style.left = (ox + e.clientX - sx) + 'px';
      modal.style.top  = (oy + e.clientY - sy) + 'px';
    });
    document.addEventListener('mouseup', () => {
      dragging = false; document.body.style.userSelect = '';
    });
  })();

  function showToast(msg, kind) {
    const t = document.getElementById('nmc-toast');
    if (!t) return;
    if (kind === 'ok') {
      t.style.background = '#D1FAE5'; t.style.color = '#065F46'; t.style.borderLeft = '3px solid #065F46';
    } else {
      t.style.background = '#FEE2E2'; t.style.color = '#B91C1C'; t.style.borderLeft = '3px solid #DC2626';
    }
    t.innerHTML = `<i class="fas fa-${kind==='ok'?'check-circle':'exclamation-circle'}"></i> ${msg}`;
    t.style.display = 'flex';
  }

  window.nmcSend = async function () {
    const btn = document.getElementById('nmc-send-btn');
    const lbl = document.getElementById('nmc-send-label');
    const to = chipsFor('to');
    const cc = chipsFor('cc');
    const bcc = chipsFor('bcc');
    const subject = document.getElementById('nmc-subject').value.trim();
    const body    = document.getElementById('nmc-body').value;

    if (!to.length) { showToast('{% trans "Add at least one recipient." %}'); return; }
    if (!subject)   { showToast('{% trans "Subject is required." %}'); return; }

    btn.disabled = true;
    lbl.textContent = '{% trans "Sending…" %}';

    const fd = new FormData();
    to.forEach(e => fd.append('to[]', e));
    cc.forEach(e => fd.append('cc[]', e));
    bcc.forEach(e => fd.append('bcc[]', e));
    fd.append('subject', subject);
    fd.append('body', body);
    const c = document.getElementById('nmc-company-id')?.value;
    const k = document.getElementById('nmc-contact-id')?.value;
    if (c) fd.append('company_id', c);
    if (k) fd.append('contact_id', k);
    attachedFiles.forEach(f => fd.append('attachments', f));

    try {
      const r = await fetch(SEND_URL, {
        method: 'POST',
        headers: { 'X-CSRFToken': csrf, 'X-Requested-With': 'XMLHttpRequest' },
        body: fd,
      });
      const data = await r.json();
      if (!r.ok || !data.success) throw new Error(data.error || 'Send failed');
      showToast('{% trans "Sent!" %}', 'ok');
      setTimeout(() => {
        closeComposeModal();
        if (typeof htmx !== 'undefined') {
          const mainHost = document.getElementById('mb-main-host');
          if (mainHost) {
            htmx.ajax('GET', '{% url 'email_automation:my_emails' %}?folder=sent', '#mb-main-host');
          }
        }
      }, 700);
    } catch (e) {
      showToast(e.message || 'Send failed');
      btn.disabled = false;
      lbl.textContent = '{% trans "Send" %}';
    }
  };

  // Auto-focus the most useful field on open
  setTimeout(() => {
    const subj = document.getElementById('nmc-subject');
    const body = document.getElementById('nmc-body');
    const toInp = document.querySelector('.nmc-chips-box[data-kind="to"] .nmc-chip-input');
    if (subj && subj.value && body) body.focus();
    else if (toInp && !toInp.previousElementSibling) toInp.focus();
    else if (subj) subj.focus();
  }, 100);
})();
</script>
