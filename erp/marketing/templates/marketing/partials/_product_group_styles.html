{% comment %}
Shared styles for the product-group pages (detail/settings + create).
Both pages render the same settings cards via _product_group_form_cards.html,
so the design tokens live here once.
{% endcomment %}
<style>
.pgd { padding: 22px 28px 100px; font-family: var(--font-sans, 'Plus Jakarta Sans', system-ui, sans-serif); color: var(--fg-default, #0F1419); }
.pgd, .pgd * { box-sizing: border-box; }

.pgd-back { display: inline-flex; align-items: center; gap: 6px; font: 600 12.5px var(--font-sans, sans-serif); color: var(--fg-muted, #6B7280); text-decoration: none; margin-bottom: 10px; }
.pgd-back:hover { color: var(--nejum-teal-700, #005354); }
.pgd-back i { width: 14px; height: 14px; }

.pgd-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
.pgd-head-l { display: flex; align-items: center; gap: 14px; }
.pgd-avatar {
  width: 52px; height: 52px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
  background: linear-gradient(135deg, var(--nejum-teal-50, #E6F5F5), #D6ECEB);
  display: flex; align-items: center; justify-content: center; color: var(--nejum-teal-600, #00696A);
}
.pgd-avatar img { width: 100%; height: 100%; object-fit: cover; }
.pgd-avatar i { width: 24px; height: 24px; opacity: 0.6; }
.pgd-title { font: 800 24px var(--font-sans, sans-serif); letter-spacing: -0.01em; margin: 0; text-transform: capitalize; }
.pgd-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font: 700 11px var(--font-sans, sans-serif); }
.pgd-badge.on { background: var(--success-50, #ECFDF5); color: var(--success-700, #047857); border: 1px solid rgba(4,120,87,0.25); }
.pgd-badge.off { background: var(--bg-subtle, #F2F5F8); color: var(--fg-muted, #6B7280); border: 1px solid var(--border-default, #E0E6EE); }

.pgd-btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 10px;
  border: 1px solid transparent; cursor: pointer; font: 600 13px var(--font-sans, sans-serif);
  text-decoration: none; transition: all 140ms;
}
.pgd-btn.primary {
  background: linear-gradient(180deg, var(--nejum-teal-500, #008080), var(--nejum-teal-600, #00696A));
  border-color: var(--nejum-teal-700, #005354); color: #fff;
  box-shadow: 0 1px 2px rgba(15,23,31,0.10), inset 0 1px 0 rgba(255,255,255,0.18);
}
.pgd-btn.primary:hover { filter: brightness(1.05); color: #fff; }
.pgd-btn.ghost { background: var(--bg-surface, #fff); border-color: var(--border-default, #E0E6EE); color: var(--fg-default, #374151); }
.pgd-btn.ghost:hover { background: var(--bg-subtle, #F8FAFC); }
.pgd-btn.danger { background: #FEF2F2; border-color: #FCA5A5; color: #B23B3B; }
.pgd-btn.danger:hover { background: #FCE4E4; }
.pgd-btn[disabled] { opacity: 0.55; pointer-events: none; }
.pgd-btn i { width: 15px; height: 15px; }

.pgd-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.pgd-stat {
  background: var(--bg-surface, #fff); border: 1px solid var(--border-default, #E4E9EF);
  border-radius: 12px; padding: 13px 16px;
}
.pgd-stat-v { font: 800 20px var(--font-sans, sans-serif); font-variant-numeric: tabular-nums; }
.pgd-stat-l { font: 600 11px var(--font-sans, sans-serif); letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted, #6B7280); margin-top: 2px; }

.pgd-cols { display: grid; grid-template-columns: minmax(340px, 5fr) minmax(380px, 7fr); gap: 18px; align-items: start; }
@media (max-width: 1100px) { .pgd-cols { grid-template-columns: 1fr; } }
.pgd-cols-single { max-width: 640px; }

.pgd-card {
  background: var(--bg-surface, #fff); border: 1px solid var(--border-default, #E4E9EF);
  border-radius: 14px; padding: 18px; margin-bottom: 16px;
  box-shadow: var(--shadow-xs, 0 1px 2px rgba(15,23,31,0.05));
}
.pgd-card-title { display: flex; align-items: center; gap: 9px; font: 700 14px var(--font-sans, sans-serif); margin-bottom: 14px; }
.pgd-card-title i { width: 16px; height: 16px; color: var(--nejum-teal-600, #00696A); }

.pgd-field { margin-bottom: 13px; }
.pgd-field:last-child { margin-bottom: 0; }
.pgd-field > label { display: block; font: 700 11px var(--font-sans, sans-serif); letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted, #6B7280); margin-bottom: 6px; }
.pgd-input, .pgd-textarea {
  width: 100%; border: 1px solid var(--border-default, #DDE3EA); border-radius: 9px;
  padding: 9px 12px; font: 500 13.5px var(--font-sans, sans-serif); color: inherit;
  background: var(--bg-surface, #fff); outline: none; transition: border-color 140ms, box-shadow 140ms;
}
.pgd-input:focus, .pgd-textarea:focus { border-color: var(--nejum-teal-500, #008080); box-shadow: 0 0 0 3px rgba(0,128,128,0.12); }
.pgd-hint { font: 500 11px var(--font-sans, sans-serif); color: var(--fg-subtle, #9AA3AC); margin-top: 5px; line-height: 1.5; }
.pgd-row2 { display: flex; gap: 12px; }
.pgd-row2 > .pgd-field { flex: 1; min-width: 0; }

.pgd-toggle { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.pgd-toggle-info { font: 600 13px var(--font-sans, sans-serif); }
.pgd-toggle-desc { font: 500 11.5px var(--font-sans, sans-serif); color: var(--fg-muted, #6B7280); margin-top: 2px; }
.pgd-switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
.pgd-switch input { display: none; }
.pgd-switch .track {
  position: absolute; inset: 0; border-radius: 999px; background: #CBD5DC; cursor: pointer; transition: background 160ms;
}
.pgd-switch .track::after {
  content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(15,23,31,0.25); transition: left 160ms;
}
.pgd-switch input:checked + .track { background: var(--nejum-teal-500, #008080); }
.pgd-switch input:checked + .track::after { left: 21px; }

.pgd-margin-example {
  margin-top: 8px; padding: 9px 12px; border-radius: 9px;
  background: var(--nejum-teal-50, #E6F5F5); border: 1px solid rgba(0,128,128,0.2);
  font: 600 12px var(--font-sans, sans-serif); color: var(--nejum-teal-700, #005354);
}
.pgd-apply-box {
  margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border-default, #DFE5EB);
  display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
}
.pgd-apply-note { font: 500 11.5px var(--font-sans, sans-serif); color: var(--fg-muted, #6B7280); flex: 1; min-width: 200px; line-height: 1.5; }

.pgd-save-bar { display: flex; justify-content: flex-end; gap: 10px; }
.pgd-flash {
  display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 10px;
  font: 600 12.5px var(--font-sans, sans-serif); margin-bottom: 14px;
}
.pgd-flash.ok { display: flex; background: var(--success-50, #ECFDF5); color: var(--success-700, #047857); border: 1px solid rgba(4,120,87,0.25); }
.pgd-flash.err { display: flex; background: #FEF2F2; color: #B23B3B; border: 1px solid #FCA5A5; }

.pgd-table-wrap { overflow-x: auto; }
.pgd-table { width: 100%; border-collapse: collapse; font: 500 12.5px var(--font-sans, sans-serif); }
.pgd-table th {
  text-align: left; font: 700 10.5px var(--font-sans, sans-serif); letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--fg-muted, #6B7280); padding: 8px 10px; border-bottom: 1px solid var(--border-default, #E4E9EF); white-space: nowrap;
}
.pgd-table td { padding: 9px 10px; border-bottom: 1px solid var(--border-subtle, #EEF2F6); vertical-align: middle; }
.pgd-table tr:hover td { background: var(--bg-subtle, #F7FAFB); }
.pgd-table .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.pgd-sku { font: 600 11.5px var(--font-mono, ui-monospace, monospace); color: #A9852F; }
.pgd-p-title { font-weight: 600; }
.pgd-p-title a { color: inherit; text-decoration: none; }
.pgd-p-title a:hover { color: var(--nejum-teal-700, #005354); }
.pgd-mini-chip {
  display: inline-flex; padding: 2px 8px; border-radius: 999px; font: 600 10.5px var(--font-sans, sans-serif);
  background: var(--bg-subtle, #F2F5F8); color: var(--fg-muted, #4B5563); border: 1px solid var(--border-subtle, #E7ECF1);
}
.pgd-mini-chip.warn { background: #FFF7E6; color: #8B5A00; border-color: #F5D78B; }
.pgd-mini-chip.teal { background: var(--nejum-teal-50, #E6F5F5); color: var(--nejum-teal-700, #005354); border-color: rgba(0,128,128,0.22); }
.pgd-table-empty { text-align: center; padding: 34px 10px; color: var(--fg-muted, #6B7280); }
</style>
