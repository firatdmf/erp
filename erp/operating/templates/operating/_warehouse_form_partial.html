{% load i18n %}
<div class="sidebar-header">
  <button class="sidebar-close" type="button" onclick="closeWarehouseSidebar()" aria-label="{% trans 'Close' %}">
    <i class="fas fa-times"></i>
  </button>
  <div class="sidebar-title">
    <i class="fas fa-warehouse"></i>
    <h2>{% trans "Add a warehouse" %}</h2>
  </div>
</div>

<div class="sidebar-content">
  <form id="warehouseForm" method="post" onsubmit="submitWarehouseForm(event); return false;">
    {% csrf_token %}

    <div class="form-group">
      <label for="id_wh_name">{% trans "Name" %} <span style="color:#ef4444;">*</span></label>
      <input type="text" name="name" id="id_wh_name" class="form-input" required autofocus
             placeholder="{% trans 'Main warehouse, Branch A…' %}">
      <div id="wh_name_error" style="color:#ef4444; font-size:12px; margin-top:4px; display:none;"></div>
    </div>

    <div class="form-group">
      <label for="id_wh_location">{% trans "Location" %}</label>
      <input type="text" name="location" id="id_wh_location" class="form-input"
             placeholder="{% trans 'Istanbul, Turkey' %}">
    </div>

    <div class="form-group">
      <label for="id_wh_book">{% trans "Accounting book" %}</label>
      <select name="accounting_book" id="id_wh_book" class="form-input">
        <option value="">{% trans "— None —" %}</option>
        {% for book in books %}
          <option value="{{ book.id }}">{{ book.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="id_wh_description">{% trans "Description" %}</label>
      <textarea name="description" id="id_wh_description" class="form-textarea" rows="3"
                placeholder="{% trans 'Optional notes about this warehouse' %}"></textarea>
    </div>

    <div class="sidebar-footer">
      <button type="submit" id="warehouseSubmitBtn" class="btn btn-primary">
        <span class="btn-text">{% trans "Add warehouse" %}</span>
        <span class="btn-spinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
      </button>
      <button type="button" class="btn btn-secondary" onclick="closeWarehouseSidebar()">
        {% trans "Cancel" %}
      </button>
    </div>
  </form>
</div>
